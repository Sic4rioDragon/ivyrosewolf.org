<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>DBD Survivors — IvyRoseWolf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="../assets/icons/ivy_logo.png">

  <meta name="description" content="IvyRoseWolf Dead by Daylight survivors — builds and clips.">
  <meta property="og:title" content="Dead by Daylight • Survivors • IvyRoseWolf">
  <meta property="og:description" content="Survivor collection — builds + clips.">
  <meta property="og:image" content="https://sic4riodragon.uk/deadbydaylight/assets/img/banner1.png" />
  <meta property="og:url" content="https://ivyrosewolf.org/deadbydaylight/survivors.html">
  <meta name="twitter:card" content="summary_large_image">
</head>

<body>
  <div class="topbar">
    <a class="back-btn" href="https://ivyrosewolf.org/">← Back to Home</a>

    <div class="titleblock">
      <div class="title-row">
        <a class="title-avatar-link" href="/deadbydaylight/survivors.html" title="Go to Survivors">
          <img class="title-avatar" src="../assets/images/Main_Orela.png" alt="Survivors">
        </a>

        <div class="title-text">
          <h1>Dead by Daylight</h1>
          <p>Ivy’s survivor collection</p>
        </div>

        <a class="title-avatar-link" href="/deadbydaylight/" title="Go to Killers">
          <img class="title-avatar" src="../assets/images/Main_SkullMerchant.png" alt="Killers">
        </a>
      </div>
    </div>

    <div style="width:140px;"></div>
  </div>

  <div class="controls">
    <input id="searchInput" class="search" type="search" placeholder="Search survivors… (e.g. orela)" autocomplete="off">
  </div>

  <main id="survivor-grid"></main>

  <footer>
    <p id="updated"></p>
    <button id="toggleNamesBtn" class="toggle-btn" type="button">Turn names off</button>
  </footer>

  <div id="killerModal" class="modal hidden">
    <div class="modal-card">
      <button id="modalClose" class="modal-close">×</button>
      <h2 id="modalName"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="survivors.js"></script>
</body>
</html>
